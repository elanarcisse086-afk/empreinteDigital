<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioStock - Dashboard Administration</title>
    <style>
        /* DESIGN MODERNE & DARK MODE */
        :root {
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --primary: #2563eb;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
            --whatsapp: #25D366;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0f172a;
                --card: #1e293b;
                --text: #f1f5f9;
                --shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            }
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, sans-serif;
            margin: 0;
            padding: 20px;
            transition: background 0.3s ease;
        }

        .container {
            max-width: 1000px;
            margin: auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        h1 { margin: 0; font-size: 1.8rem; }
        #dateDuJour { color: #64748b; margin-top: 5px; }

        /* GRILLE DE STATISTIQUES */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card);
            padding: 20px;
            border-radius: 16px;
            box-shadow: var(--shadow);
            text-align: center;
            border-bottom: 4px solid transparent;
        }

        .stat-card h3 { margin: 0; font-size: 0.85rem; text-transform: uppercase; color: #64748b; }
        .stat-card p { margin: 10px 0 0; font-size: 1.8rem; font-weight: 800; }

        /* TABLEAU DES DONNÉES */
        .table-container {
            background: var(--card);
            border-radius: 16px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #f1f5f9;
            padding: 15px;
            text-align: left;
            font-size: 0.9rem;
            color: #475569;
        }

        @media (prefers-color-scheme: dark) {
            th { background: #334155; color: #f1f5f9; }
        }

        td {
            padding: 15px;
            border-top: 1px solid #e2e8f0;
            font-size: 0.95rem;
        }

        /* BADGES DE STATUT */
        .badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .badge-present { background: #dcfce7; color: var(--success); }
        .badge-retard { background: #fef3c7; color: var(--warning); }
        .badge-absent { background: #fee2e2; color: var(--danger); }

        /* BOUTON WHATSAPP */
        .btn-whatsapp {
            background: var(--whatsapp);
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: opacity 0.2s;
        }

        .btn-whatsapp:hover { opacity: 0.9; }

        .refresh-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
        }
    </style>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#020617">
</head>
<body>

    <div class="container">
        <header>
            <div>
                <h1>BioStock Dashboard</h1>
                <p id="dateDuJour">Chargement...</p>
            </div>
            <button class="refresh-btn" onclick="window.location.reload()">Actualiser 🔄</button>
        </header>

        <!-- Section Statistiques -->
        <div class="stats-grid">
            <div class="stat-card" style="border-color: var(--primary);">
                <h3>Inscrits</h3>
                <p id="totalInscrits">0</p>
            </div>
            <div class="stat-card" style="border-color: var(--success);">
                <h3>Présents</h3>
                <p id="totalPresents" style="color: var(--success);">0</p>
            </div>
            <div class="stat-card" style="border-color: var(--warning);">
                <h3>Retards</h3>
                <p id="totalRetards" style="color: var(--warning);">0</p>
            </div>
            <div class="stat-card" style="border-color: var(--danger);">
                <h3>Absents</h3>
                <p id="totalAbsents" style="color: var(--danger);">0</p>
            </div>
        </div>

        <!-- Tableau de suivi -->
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Étudiant</th>
                        <th>Matricule</th>
                        <th>Statut</th>
                        <th>Action Rapide</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="4" style="text-align:center;">Récupération des données Firebase...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        // CONFIGURATION FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyDncZQBPC4i8YPWlNVrsDfXW5K7e4xIF2s",
            authDomain: "empreinte-df8eb.firebaseapp.com",
            projectId: "empreinte-df8eb",
            storageBucket: "empreinte-df8eb.firebasestorage.app",
            messagingSenderId: "359377971742",
            appId: "1:359377971742:web:0b9338130b71925dfedc0f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function chargerRapportComplet() {
            const now = new Date();
            const dateISO = now.toLocaleDateString('en-CA'); // Format YYYY-MM-DD
            
            document.getElementById('dateDuJour').innerText = now.toLocaleDateString('fr-FR', { 
                weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' 
            });

            const tableBody = document.getElementById('tableBody');

            try {
                // 1. Liste de tous les inscrits (BioStock Étudiants)
                const snapEtudiants = await getDocs(collection(db, "etudiants"));
                let listeGlobale = [];
                snapEtudiants.forEach(doc => listeGlobale.push(doc.data()));

                // 2. Liste des présences enregistrées aujourd'hui
                const q = query(collection(db, "presences"), where("dateUnique", "==", dateISO));
                const snapPresences = await getDocs(q);
                
                let presencesJour = {};
                snapPresences.forEach(doc => {
                    const data = doc.data();
                    presencesJour[data.matricule] = data.statut;
                });

                // 3. Calcul et génération des lignes
                let stats = { presents: 0, retards: 0, absents: 0 };
                tableBody.innerHTML = "";

                listeGlobale.forEach(etudiant => {
                    const statut = presencesJour[etudiant.matricule] || "Absent";
                    
                    if (statut === "Présent") stats.presents++;
                    else if (statut === "En retard") stats.retards++;
                    else stats.absents++;

                    let badgeType = "badge-absent";
                    if (statut === "Présent") badgeType = "badge-present";
                    if (statut === "En retard") badgeType = "badge-retard";

                    // Message WhatsApp prêt pour l'administration de la SOCEGO
                    const msgWA = `INFO BIOSTOCK\n-------------------\nÉtudiant: ${etudiant.nom}\nMatricule: ${etudiant.matricule}\nStatut: ${statut}\nDate: ${dateISO}\n-------------------\nPlateforme gérée par Beauclaire.`;
                    const linkWA = `https://wa.me/?text=${encodeURIComponent(msgWA)}`;

                    tableBody.innerHTML += `
                        <tr>
                            <td><strong>${etudiant.nom}</strong></td>
                            <td><code>${etudiant.matricule}</code></td>
                            <td><span class="badge ${badgeType}">${statut}</span></td>
                            <td><a href="${linkWA}" target="_blank" class="btn-whatsapp">WhatsApp 📲</a></td>
                        </tr>
                    `;
                });

                // Mise à jour des compteurs du Dashboard
                document.getElementById('totalInscrits').innerText = listeGlobale.length;
                document.getElementById('totalPresents').innerText = stats.presents;
                document.getElementById('totalRetards').innerText = stats.retards;
                document.getElementById('totalAbsents').innerText = stats.absents;

            } catch (err) {
                console.error("Erreur Dashboard:", err);
                tableBody.innerHTML = "<tr><td colspan='4'>Erreur de connexion avec Firebase.</td></tr>";
            }
        }

        chargerRapportComplet();
    </script>
</body>
</html>
