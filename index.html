<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioStock - Inscription Biométrique</title>
    <!-- Lien vers ton fichier CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <h2>Institut Mony Keng</h2>
            <p>Système de Pointage Biométrique</p>
            
            <div class="input-group">
                <label for="nom">Nom Complet</label>
                <input type="text" id="nom" placeholder="Ex: Ela Nkamje Narcisse" required>
            </div>

            <div class="input-group">
                <label for="matricule">Matricule / ID</label>
                <input type="text" id="matricule" placeholder="Ex: IMK-2026-001" required>
            </div>

            <button id="btnEmpreinte" class="btn-primary">
                <span class="icon">☝️</span> ENREGISTRER L'EMPREINTE
            </button>

            <div id="status" class="status-message">En attente d'action...</div>
        </div>
    </div>

    <!-- Lien vers ton fichier JS (obligatoire pour Firebase) -->
    <script type="module" src="script.js"></script>
</body>
</html>
