<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioStock - Identification SOCEGO</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="logo">☝️</div>
            <h2>BioStock</h2>
            <p>Pointage Biométrique Professionnel</p>
            
            <div class="input-group">
                <label>Nom complet</label>
                <input type="text" id="nom" placeholder="Entrez votre nom" required>
            </div>

            <div class="input-group">
                <label>Matricule</label>
                <input type="text" id="matricule" placeholder="Ex: IMK-2026-XYZ">
            </div>

            <button id="btnEmpreinte" class="btn-primary">SCANNER MON DOIGT</button>
            <div id="status" class="status-message">Prêt pour identification</div>
        </div>
    </div>

    <!-- BOÎTE DE DIALOGUE D'IDENTIFICATION (MODAL) -->
    <div id="infoModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">✅ Identification Réussie</div>
            <div class="modal-body">
                <p id="infoDetails"></p>
            </div>
            <button class="btn-close" id="btnFermer">Fermer</button>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
