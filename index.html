<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioStock - Enrôlement</title>
    
    <!-- LE LIEN CRUCIAL VERS TON CSS -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Police moderne pour un look pro -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Structure pour le design Glassmorphism -->
    <div class="glass-container">
        <div class="welcome-section">
            <div class="logo-circle">👤</div>
            <h1>Bienvenue</h1>
            <p>Créez votre identité numérique pour l'accès biométrique à la SOCEGO.</p>
        </div>

        <div class="form-group">
            <div class="input-wrapper">
                <label for="nom">Nom Complet</label>
                <input type="text" id="nom" placeholder="Ex: Ela Nkamje Beauclaire" required>
            </div>
            
            <div class="input-wrapper">
                <label for="matricule">Matricule</label>
                <input type="text" id="matricule" placeholder="Ex: IMK-2026-001" required>
            </div>
        </div>

        <button id="btnEnregistrer" class="btn btn-primary">
            Enregistrer mon profil ☝️
        </button>

        <p id="status"></p>

        <div class="footer-links">
            <p>Déjà enregistré ?</p>
            <a href="scan.html" class="link-goto">Aller au Scanner →</a>
        </div>
    </div>

    <!-- Script de logique JS -->
    <script type="module" src="script.js"></script>
</body>
</html>
