<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioStock - Scan Rapide</title>
    <link rel="stylesheet" href="scanStyle.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="icon">☝️</div>
            <h2>Terminal SOCEGO</h2>
            <p>Posez votre doigt pour pointer</p>
            <button id="btnScan" class="btn-scan">SCANNER MON DOIGT</button>
            <p id="status">Prêt pour le scan</p>
        </div>
    </div>

    <!-- TA BOÎTE DE DIALOGUE (MODAL) -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="modal-icon">✅</div>
            <h3 style="color:#22c55e">IDENTIFIÉ !</h3>
            <div id="details" class="modal-body">
                <!-- Les infos s'afficheront ici via le JS -->
            </div>
            <button class="btn-close" id="btnFermer">TERMINER</button>
        </div>
    </div>

    <script type="module" src="scanScript.js"></script>
</body>
</html>
