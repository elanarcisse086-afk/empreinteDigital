<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioStock - Scanner Biométrique</title>
    
    <!-- Lien vers le fichier CSS High-Tech -->
    <link rel="stylesheet" href="scanStyle.css">
    
    <!-- Google Fonts pour le look technologique -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        <header>
            <h1>BioStock Scan</h1>
            <p style="color: #94a3b8;">Identification en cours...</p>
        </header>

        <!-- Zone du Scanner avec animation laser -->
        <div class="scan-container">
            <div class="pulse-ring"></div>
            <div class="fingerprint-wrapper" id="btnScan">
                <div class="laser-line"></div>
                <span class="icon-finger">☝️</span>
                <span class="scan-text">Scanner</span>
            </div>
        </div>

        <!-- Statut du système -->
        <div id="status">En attente de l'empreinte...</div>

        <div class="footer-links" style="margin-top: 40px;">
            <a href="dashboard.html" style="color: #6366f1; text-decoration: none; font-weight: 600;">
                ← Accéder au Dashboard
            </a>
        </div>
    </div>

    <!-- Fenêtre Modale de succès (cachée par défaut) -->
    <div id="modal">
        <div class="modal-content">
            <h2 style="color: #22c55e;">✅ Scan Réussi</h2>
            <div id="details">
                <!-- Les infos (Nom, Statut, Heure) seront insérées ici par le JS -->
            </div>
            <button id="btnFermer" class="btn-close">Fermer</button>
        </div>
    </div>

    <!-- Logique Firebase et WebAuthn -->
    <script type="module" src="scanScript.js"></script>

</body>
</html>
